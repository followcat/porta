<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Porta{% endblock %}</title>
  <link rel="stylesheet" href="/static/app.css">
  <script defer src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script defer src="https://unpkg.com/alpinejs@3.14.9/dist/cdn.min.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const pressedClass = "is-pressed";

      document.addEventListener("pointerdown", (event) => {
        const button = event.target.closest(".button");
        if (!button) {
          return;
        }
        button.classList.add(pressedClass);
      });

      document.addEventListener("pointerup", () => {
        document.querySelectorAll(`.button.${pressedClass}`).forEach((button) => {
          button.classList.remove(pressedClass);
        });
      });

      document.addEventListener("pointercancel", () => {
        document.querySelectorAll(`.button.${pressedClass}`).forEach((button) => {
          button.classList.remove(pressedClass);
        });
      });

      document.addEventListener("submit", (event) => {
        const submitter = event.submitter;
        if (!(submitter instanceof HTMLElement) || !submitter.classList.contains("button")) {
          return;
        }
        const busyLabel = submitter.dataset.busyLabel || "Working...";
        if (!submitter.dataset.originalLabel) {
          submitter.dataset.originalLabel = submitter.textContent.trim();
        }
        submitter.textContent = busyLabel;
        submitter.classList.add("is-submitting");
        submitter.setAttribute("aria-busy", "true");
        submitter.setAttribute("disabled", "disabled");
      });
    });
  </script>
</head>
<body hx-boost="true">
  <div class="bg-orb orb-one"></div>
  <div class="bg-orb orb-two"></div>
  <div class="shell">
    <header class="topbar">
      <a class="brand" href="/dashboard">
        <span class="brand-mark">P</span>
        <span>
          <strong>Porta</strong>
          <small>SSH Forward Control Plane</small>
        </span>
      </a>
      {% if current_user %}
      <nav class="nav">
        <a href="/dashboard">Dashboard</a>
        <a href="/tunnels">Tunnels</a>
        <a href="/credentials">Credentials</a>
        <a href="/audit">Audit</a>
      </nav>
      <form method="post" action="/logout" class="logout-form">
        <span class="muted">Signed in as {{ current_user.username }}</span>
        <button type="submit" class="button subtle">Logout</button>
      </form>
      {% endif %}
    </header>
    <main class="page">
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
